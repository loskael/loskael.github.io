<style>
  #main {
    display: flex;
    align-items: center;
    justify-content: space-evenly;
  }

  .stage div {
    border: 1px solid #333;
    padding: 0 6px;
    margin: 10px 10px 10px 0;
    height: 40px;
    line-height: 40px;
    position: relative;
    font-size: 12px;
    text-align: center;
    white-space: nowrap;
  }

  .stage div.on {
    outline: 1px solid #0f0;
  }

  .stage div::before {
    content: attr(data-index);
    position: absolute;
    line-height: 12px;
    left: 1px;
    top: 1px;
  }

  .stage div:nth-child(odd)::after {
    content: '';
    width: 10px;
    height: 25px;
    border-top: 1px solid #333;
    border-right: 1px solid #333;
    position: absolute;
    right: -11px;
    top: 20px;
  }

  .stage div:nth-child(even)::after {
    content: '';
    width: 10px;
    height: 25px;
    border-right: 1px solid #333;
    border-bottom: 1px solid #333;
    position: absolute;
    right: -11px;
    top: -5px;
  }

  .stage div.w,
  .stage div.w:nth-child(odd)::after,
  .stage div.w:nth-child(even)::after {
    border-color: #f00;
  }

  .stage:nth-child(2) div {
    margin: 62px 10px;
  }

  .stage:nth-child(3) div {
    margin: 166px 10px;
  }

  .stage:nth-child(4) div {
    margin: 372px 10px;
  }

  .stage:last-child div {
    overflow: hidden;
  }
</style>
<!--#insert file="../template/-header.html" -->
<div id="main"></div>
<!--#insert file="../template/-footer.html" -->
<!--#insert file="../template/-script.html" -->
<script>
  const matchs = {
    LANKE2023: [
      `дёҒжө©,и®ёзҡ“йӢҗ`,
      `иҝһз¬‘,е…іиҲӘеӨӘйғҺ`,
      `жұҹз»ҙжқ°,йҳҝйҮҢВ·иҙҫе·ҙжһ—`,
      `жӘҖе•ё,и®ёе®¶е…ғ`,
      `жӣ№жҪҮйҳі,жңҙй”®жҳҠ`,
      `йҷ¶ж¬Јз„¶,е§ңдёңж¶Ұ`,
      `и°ўе°”иұӘ,дә•еұұиЈ•еӨӘ`,
      `иөөжҷЁе®Ү,жңҙе»·жЎ“`,
      `е”җйҹҰжҳҹ,еҚһзӣёеЈ№`,
      `е®үжҲҗжөҡ,дҪҷжӯЈйә’`,
      `жқҺй’ҰиҜҡ,з”ізңҹи°һ`,
      `зҺӢжҳҹжҳҠ,дјҠз”°з¬ғеҸІ`,
      `жқҺиҪ©иұӘ,е…ғжҷҹжәұ`,
      `жҹҜжҙҒ,иө–еқҮиҫ…`,
      `жқҺз»ҙжё…,жјҶеңЈйўҗ`,
      `иҫңжў“иұӘ,йҹ©жҳҮе‘Ё`,
    ].join(','),
    GUOSHOU2023: [
      `иҠҲжҳұе»·,й»„дә‘еө©`,
      `з«ҘжўҰжҲҗ,е”җйҹҰжҳҹ`,
      `жҹҒеҳүзҶ№,е…ҡжҜ…йЈһ`,
      `йҷ¶ж¬Јз„¶,е»–е…ғиө«`,
      `и°ўз§‘,иҢғе»·й’°`,
      `иөөжҷЁе®Ү,жұҹз»ҙжқ°`,
      `еј ж¶ӣ,жқҺз»ҙжё…`,
      `еұ жҷ“е®Ү,иҫңжў“иұӘ`,
      `жқЁйјҺж–°,и°ўе°”иұӘ`,
      `иҝһз¬‘,и°ӯе•ё`,
      `йҷҲиҙӨ,дјҠеҮҢж¶ӣ`,
      `жқҺиҪ©иұӘ,ж—¶и¶Ҡ`,
      `зҺӢжҳҹзҡ“,еҪӯз«Ӣе°§`,
      `жқЁеҮҜж–Ү,йҷҲжў“еҒҘ`,
      `и®ёеҳүйҳі,жқҺй’ҰиҜҡ`,
      `йҹ©дёҖжҙІ,жҹҜжҙҒ`,
    ].join(','),
  };
  const params = new URLSearchParams(location.search);
  const player = String(matchs[params.get('match')] || params.get('player') || '').split(',').filter(v => !!v);
  const counts = (params.get('counts') >> 0) || player.length;
  const result = String(params.get('result') || '').split(',').map((v, i) => parseInt(v, 16).toString(2).padStart(counts / (2 ** i), '0'));
  const $main = document.getElementById('main');

  const next = (winer = [], result = '') => {
    if (!Array.isArray(winer) || !winer.length) return [];
    const $root = document.createElement('div');
    $root.classList.add('stage', 'stage' + winer.length);
    $root.dataset.result = result;
    winer.map((v, i) => {
      const $el = document.createElement('div');
      result[i] == 1 && $el.classList.add('w');
      $el.setAttribute('data-index', i + 1);
      $el.innerText = v;
      $root.appendChild($el);
    });
    $main.appendChild($root);
    return winer.filter((v, i) => result[i] === '1');
  };

  let round = Math.ceil(Math.log2(counts)) + 1;
  let winer = player;
  while (round > 0) {
    winer = next(winer, result.shift());
    --round;
  }

  const queryStageResult = $stage => [...$stage.querySelectorAll('div')]
    .map($item => +$item.classList.contains('on')).join('');
  [...document.querySelectorAll('.stage div')].forEach($el => {
    $el.addEventListener('click', () => {
      $el.classList.toggle('on');
      const result = [...document.querySelectorAll('.stage')].map($stage => {
        return $stage.dataset.result || queryStageResult($stage);
      });
      console.log('result =', result.map(v => parseInt(v, 2).toString(16)).join(','));
    });
  });
</script>
